<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YourMind</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        width: 320px;
        background:
          radial-gradient(circle at top right, rgba(255, 0, 140, 0.2), transparent 28%),
          linear-gradient(180deg, #fff9fd, #fff1f8);
        color: #180811;
        overflow: hidden;
      }

      .container {
        padding: 20px;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
      }

      .logo {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
        box-shadow: 0 12px 28px rgba(255, 0, 140, 0.18);
      }

      .logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .brand {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: #180811;
      }

      .tagline {
        font-size: 10px;
        color: #8d5b76;
        margin-left: auto;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      /* ── Page info card ── */
      .page-card {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(24, 8, 17, 0.08);
        border-radius: 18px;
        padding: 12px 14px;
        margin-bottom: 14px;
        box-shadow:
          0 18px 50px rgba(56, 10, 38, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      .page-title {
        font-size: 13px;
        font-weight: 600;
        color: #220d18;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 4px;
      }

      .page-url {
        font-size: 11px;
        color: #8d5b76;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ── Save button ── */
      .save-btn {
        width: 100%;
        padding: 11px;
        background: linear-gradient(135deg, #1b0913, #7a0050 55%, #ff008c);
        color: #fff;
        border: none;
        border-radius: 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        transition: opacity 0.15s;
        letter-spacing: -0.1px;
      }

      .save-btn:hover {
        opacity: 0.9;
      }

      .save-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .save-btn svg {
        width: 15px;
        height: 15px;
        flex-shrink: 0;
      }

      /* ── Status ── */
      .status {
        margin-top: 10px;
        padding: 9px 12px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .status.hidden {
        display: none;
      }

      .status.saving {
        background: rgba(255, 255, 255, 0.72);
        color: #180811;
        border: 1px solid rgba(24, 8, 17, 0.08);
      }

      .status.saved {
        background: rgba(255, 255, 255, 0.72);
        color: #4ade80;
        border: 1px solid rgba(20, 83, 45, 0.18);
      }

      .status.error {
        background: rgba(255, 255, 255, 0.72);
        color: #f87171;
        border: 1px solid rgba(69, 10, 10, 0.14);
      }

      /* ── Footer ── */
      .footer {
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }

      .footer-link {
        font-size: 11px;
        color: #8d5b76;
        cursor: pointer;
        text-decoration: none;
        transition: color 0.15s;
      }

      .footer-link:hover {
        color: #180811;
      }

      .dot {
        color: #d2adbf;
        font-size: 10px;
      }

      /* ── Spinner ── */
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .spinner {
        width: 13px;
        height: 13px;
        border: 2px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div class="logo">
          <img src="logo.png" alt="YourMind logo" />
        </div>
        <span class="brand">YourMind</span>
        <span class="tagline">Web Clipper</span>
      </div>

      <!-- Page info -->
      <div class="page-card">
        <p id="page-title" class="page-title">Loading…</p>
        <p id="page-url" class="page-url"></p>
      </div>

      <!-- Save button -->
      <button id="save-btn" class="save-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Save to YourMind
      </button>

      <!-- Status feedback -->
      <div id="status" class="status hidden"></div>

      <!-- Footer -->
      <div class="footer">
        <a id="open-dashboard" href="#" class="footer-link">Open dashboard</a>
        <span class="dot">·</span>
        <a id="configure-link" href="#" class="footer-link">Configure URL</a>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
