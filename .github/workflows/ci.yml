name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-key' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-key' }}
          LINGO_DEV_API_KEY: ${{ secrets.LINGO_DEV_API_KEY || 'placeholder-lingo-key' }}
          CHROMA_HOST: ${{ secrets.CHROMA_HOST || 'http://localhost:8000' }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY || 'placeholder-chroma-key' }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT || 'default_tenant' }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE || 'default_database' }}

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-key' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-key' }}
          LINGO_DEV_API_KEY: ${{ secrets.LINGO_DEV_API_KEY || 'placeholder-lingo-key' }}
          CHROMA_HOST: ${{ secrets.CHROMA_HOST || 'http://localhost:8000' }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY || 'placeholder-chroma-key' }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT || 'default_tenant' }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE || 'default_database' }}
